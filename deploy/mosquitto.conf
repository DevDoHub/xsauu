# Mosquitto MQTT Broker 配置
# XSAU 系统 - 边缘设备消息中转

# 监听端口
listener 1883

# 允许匿名连接（开发/POC 阶段）
# 生产环境应改为 false 并配置密码文件
allow_anonymous true

# 持久化
persistence true
persistence_location /mosquitto/data/

# 日志
log_dest stdout
log_type all
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# 最大消息大小 (bytes)，默认 1MB
# 检测框 JSON 通常很小，但留足余量
message_size_limit 1048576
